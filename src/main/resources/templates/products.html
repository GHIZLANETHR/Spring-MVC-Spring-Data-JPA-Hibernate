<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout1"
>
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.7/css/bootstrap.min.css">
</head>
<body>
    <div class="p-3" layout:fragment="content1">
        <h2 th:text="${x}">
        </h2>
        <table class="table">
            <thead>
            <tr>
                <th>id</th>
                <th>name</th>
                <th>price</th>
                <th>quantity</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p:${productList}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.price}"></td>
                <td th:text="${p.quantity}"></td>
                <td>
                    <a class="btn-danger" onclick="return confirm('Êtes vous sûre ?')"
                       th:href="@{/delete(id=${p.id})}"> Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
